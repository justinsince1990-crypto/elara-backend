<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, interactive-widget=resizes-content">
    <title>Elara</title>
    <style>
        :root {
            --bg: #f9fafb; --text: #111827; 
            --panel: rgba(255, 255, 255, 0.85);
            --user-bg: #059669; --user-text: #ffffff;
            --elara-bg: #e5e7eb; --elara-text: #111827;
            --border: #e5e7eb; --accent: #059669;
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #0f0f0f; --text: #e5e5e5; 
                --panel: rgba(26, 26, 26, 0.85);
                --user-bg: #0b4d3c; --user-text: #ffffff;
                --elara-bg: #2a2a2a; --elara-text: #e5e5e5;
                --border: #333333;
            }
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: system-ui, -apple-system, sans-serif; -webkit-tap-highlight-color: transparent; }

        /* Force body to adapt to keyboard */
        html, body { height: 100%; height: -webkit-fill-available; overflow: hidden; background-color: var(--bg); color: var(--text); }
        body { display: flex; flex-direction: column; }

        #header { padding: 14px 20px; background: var(--panel); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); z-index: 10; flex-shrink: 0; }
        .header-title { font-weight: 700; font-size: 1.2rem; letter-spacing: 0.5px; }

        .toggle-container { display: flex; align-items: center; gap: 10px; font-size: 0.85rem; font-weight: 600; color: #777; }
        .switch { position: relative; display: inline-block; width: 40px; height: 22px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; transition: .3s; border-radius: 22px; }
        .slider:before { position: absolute; content: ""; height: 16px; width: 16px; left: 3px; bottom: 3px; background-color: white; transition: .3s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--accent); }
        input:checked + .slider:before { transform: translateX(18px); }

        #chat-box { flex: 1; overflow-y: auto; padding: 20px 16px; display: flex; flex-direction: column; gap: 18px; scroll-behavior: smooth; }
        .msg-row { display: flex; width: 100%; animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .msg-row.user { justify-content: flex-end; }
        .msg-row.assistant, .msg-row.elara { justify-content: flex-start; }

        .msg-bubble { max-width: 85%; padding: 12px 16px; border-radius: 18px; line-height: 1.5; font-size: 1rem; word-wrap: break-word; }
        .user-msg { background-color: var(--user-bg); color: var(--user-text); border-bottom-right-radius: 4px; }
        .elara-msg { background-color: var(--elara-bg); color: var(--elara-text); border-bottom-left-radius: 4px; }

        .play-btn { display: inline-flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.1); border-radius: 50%; width: 28px; height: 28px; margin-left: 8px; cursor: pointer; vertical-align: middle; font-size: 0.8rem; }
        @media (prefers-color-scheme: dark) { .play-btn { background: rgba(255,255,255,0.15); } }

        #input-area { padding: 12px 16px; background: var(--panel); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); display: flex; gap: 10px; border-top: 1px solid var(--border); padding-bottom: calc(12px + env(safe-area-inset-bottom)); align-items: flex-end; z-index: 10; flex-shrink: 0; }
        #prompt { flex: 1; padding: 12px 16px; border-radius: 20px; border: 1px solid var(--border); background: var(--bg); color: var(--text); font-size: 1rem; resize: none; max-height: 120px; line-height: 1.4; outline: none; transition: border 0.2s; }
        #prompt:focus { border-color: var(--accent); }
        #send-btn { background: var(--accent); color: white; border-radius: 20px; padding: 12px 20px; height: 46px; cursor: pointer; border: none; font-weight: bold; transition: 0.2s; }
        #send-btn:disabled { opacity: 0.6; cursor: not-allowed; }
    </style>
</head>
<body>

    <div id="header">
        <div class="header-title">Elara</div>
        <div class="toggle-container">
            Voice
            <label class="switch">
                <input type="checkbox" id="autoplay-toggle" onchange="saveSettings()">
                <span class="slider"></span>
            </label>
        </div>
    </div>

    <main id="chat-box"></main>

    <div id="input-area">
        <textarea id="prompt" rows="1" placeholder="Message Elara..."></textarea>
        <button id="send-btn">Send</button>
    </div>

    <script>
        const chatBox = document.getElementById("chat-box");
        const prompt = document.getElementById("prompt");
        const sendBtn = document.getElementById("send-btn");
        const autoplayToggle = document.getElementById("autoplay-toggle");

        let localHistory = []; 

        autoplayToggle.checked = localStorage.getItem('elara_autoplay') === 'true';
        function saveSettings() { localStorage.setItem('elara_autoplay', autoplayToggle.checked); }

        function formatText(text) {
            if (!text) return "";
            return text.replace(/\*\*(.*?)\*\*/g, '<b>$1</b>').replace(/\*(.*?)\*/g, '<i>$1</i>');
        }

        function renderHistory() {
            chatBox.innerHTML = localHistory.map((m, index) => {
                let btnHTML = '';
                
                // Only attach play buttons to Elara's messages
                if (m.role === 'assistant' || m.role === 'elara') {
                    if (m.audio_url && m.audio_url !== 'undefined') {
                        // Audio already exists (Toggle was ON)
                        btnHTML = `<div class="play-btn" onclick="play('${m.audio_url}')">▶</div>`;
                    } else {
                        // Audio does not exist (Toggle was OFF), show manual generator
                        btnHTML = `<div class="play-btn" onclick="playMessageManually(${index}, this)">🔊</div>`;
                    }
                }

                return `
                <div class="msg-row ${m.role}">
                    <div class="msg-bubble ${m.role === 'user' ? 'user-msg' : 'elara-msg'}">
                        ${formatText(m.content)}
                        ${btnHTML}
                    </div>
                </div>
                `;
            }).join("");
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function play(url) {
            if (url && url !== 'undefined') new Audio(url).play();
        }

        async function playMessageManually(index, buttonElement) {
            if (buttonElement.innerText === "⏳") return; // Prevent double-clicks
            
            buttonElement.innerText = "⏳"; 
            const textToPlay = localHistory[index].content;
            
            try {
                const response = await fetch('/tts', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text: textToPlay, voice: 'af_bella' })
                });
                
                const data = await response.json();
                
                if (data.ok && data.url) {
                    localHistory[index].audio_url = data.url; // Save URL so we don't fetch it again
                    let manualAudio = new Audio(data.url);
                    manualAudio.play();
                    renderHistory(); // Re-render to swap icon to ▶
                } else {
                    buttonElement.innerText = "❌"; 
                }
            } catch (error) {
                console.error("TTS Fetch Error:", error);
                buttonElement.innerText = "❌";
            }
        }

        async function fetchResponse(msg) {
            try {
                const isVoiceOn = autoplayToggle.checked;

                const res = await fetch("/chat", {
                    method: "POST", 
                    headers: {"Content-Type": "application/json"}, 
                    body: JSON.stringify({
                        message: msg,
                        voice_enabled: isVoiceOn
                    })
                });

                const data = await res.json();

                if (data.ok && data.response) {
                    localHistory.push({
                        role: 'assistant', 
                        content: data.response,
                        audio_url: data.audio 
                    });
                    renderHistory();

                    if (data.audio && isVoiceOn) {
                        play(data.audio);
                    }
                }
            } catch (e) { console.error(e); }
        }

        sendBtn.onclick = async () => {
            if(!prompt.value.trim()) return;
            const msg = prompt.value;
            prompt.value = "";
            prompt.style.height = 'auto';
            sendBtn.disabled = true;
            sendBtn.innerText = "...";

            localHistory.push({role: 'user', content: msg});
            renderHistory();

            await fetchResponse(msg);

            sendBtn.disabled = false;
            sendBtn.innerText = "Send";
            prompt.focus();
        };

        window.visualViewport.addEventListener('resize', () => {
            document.body.style.height = window.visualViewport.height + 'px';
            chatBox.scrollTop = chatBox.scrollHeight;
        });

        prompt.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = (this.scrollHeight < 120 ? this.scrollHeight : 120) + 'px';
            chatBox.scrollTop = chatBox.scrollHeight;
        });

        prompt.addEventListener("keydown", function(e) {
            if (e.key === "Enter" && !e.shiftKey) {
                e.preventDefault();
                sendBtn.click();
            }
        });

        async function initialLoad() {
            try {
                const res = await fetch("/history");
                const data = await res.json();
                if (data.history && data.history.length > 0) {
                    localHistory = data.history;
                    renderHistory();
                }
            } catch(e) {}
        }
        initialLoad();
    </script>
</body>
</html>
