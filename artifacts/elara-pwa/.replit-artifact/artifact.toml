kind = "web"
previewPath = "/elara-pwa/"
title = "Elara PWA"
version = "1.0.0"
id = "artifacts/elara-pwa"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/elara-pwa/" ]
localPort = 19518

[services.development]
run = "pnpm --filter @workspace/elara-pwa run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/elara-pwa", "run", "build" ]
publicDir = "artifacts/elara-pwa/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19518"
BASE_PATH = "/elara-pwa/"
